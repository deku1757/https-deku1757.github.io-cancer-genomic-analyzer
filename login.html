{% extends "base.html" %}

{% block content %}

<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="max-width: 450px; width: 100%; margin: 50px auto;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 28px; margin: 0 0 10px 0;">🧬 Cancer Genomics</h1>
            <p style="color: #94a3b8;">Sign in to your account</p>
        </div>

        {% if error %}
            <div class="error-box" style="margin-bottom: 20px;">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" id="loginForm">
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: #00d4ff; font-weight: bold; margin-bottom: 8px;">
                    Username
                </label>
                <input type="text" name="username" required 
                    style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1.5px solid rgba(0, 212, 255, 0.3); border-radius: 8px; color: #e0e7ff; font-size: 14px; box-sizing: border-box; transition: all 0.3s ease;"
                    onfocus="this.style.borderColor='rgba(0, 212, 255, 0.8)'; this.style.boxShadow='0 0 15px rgba(0, 212, 255, 0.2)'; this.style.background='rgba(0, 0, 0, 0.5)';"
                    onblur="this.style.borderColor='rgba(0, 212, 255, 0.3)'; this.style.boxShadow=''; this.style.background='rgba(0, 0, 0, 0.3)';"/>
            </div>

            <div style="margin-bottom: 30px;">
                <label style="display: block; color: #00d4ff; font-weight: bold; margin-bottom: 8px;">
                    Password
                </label>
                <input type="password" name="password" required 
                    style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1.5px solid rgba(0, 212, 255, 0.3); border-radius: 8px; color: #e0e7ff; font-size: 14px; box-sizing: border-box; transition: all 0.3s ease;"
                    onfocus="this.style.borderColor='rgba(0, 212, 255, 0.8)'; this.style.boxShadow='0 0 15px rgba(0, 212, 255, 0.2)'; this.style.background='rgba(0, 0, 0, 0.5)';"
                    onblur="this.style.borderColor='rgba(0, 212, 255, 0.3)'; this.style.boxShadow=''; this.style.background='rgba(0, 0, 0, 0.3)';"/>
            </div>

            <button type="submit" style="width: 100%; padding: 14px; font-size: 16px; margin-bottom: 15px;">
                Sign In
            </button>
        </form>

        <div style="text-align: center; color: #94a3b8; font-size: 14px;">
            <p style="margin: 0;">Don't have an account? 
                <a href="/register" style="color: #00d4ff; font-weight: bold;">Create one</a>
            </p>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.querySelector('input[name="username"]').value;
        const password = document.querySelector('input[name="password"]').value;
        
        if (!username || !password) {
            alert('Please fill in all fields');
            return;
        }
        
        // Submit the form
        this.submit();
    });
</script>

{% endblock %}
