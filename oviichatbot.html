<!-- Ovii AI Chatbot Widget -->
<div id="oviiChatbot" class="ovii-chatbot">
    <!-- Chat Header -->
    <div class="ovii-header">
        <div class="ovii-title">
            <span class="ovii-icon">🤖</span>
            <span>Ovii</span>
        </div>
        <button id="oviiMinimize" class="ovii-minimize">−</button>
    </div>
    
    <!-- Chat Messages -->
    <div class="ovii-messages" id="oviiMessages">
        <div class="ovii-message bot-message">
            <div class="message-content">
                👋 Hello! I'm Ovii, your AI assistant for Cancer Genomics Analyzer. I'm here to help you understand genetic mutations, cancer risk, and VCF data analysis. What would you like to know?
            </div>
        </div>
    </div>
    
    <!-- Chat Input -->
    <div class="ovii-input-area">
        <input 
            type="text" 
            id="oviiInput" 
            class="ovii-input" 
            placeholder="Ask me anything..." 
            autocomplete="off"
        />
        <button id="oviiSend" class="ovii-send-btn">📤</button>
    </div>
</div>

<!-- Floating Chat Icon (when minimized) -->
<div id="oviiIcon" class="ovii-icon-floating">
    <span>🤖</span>
    <span class="ovii-label">Ovii</span>
</div>
